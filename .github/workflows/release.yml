name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Run tests
        run: swift test

      - name: Build app bundle
        run: |
          chmod +x scripts/build-app.sh scripts/package-dmg.sh
          ./scripts/build-app.sh "${{ steps.version.outputs.version }}" "${{ github.run_number }}"

      - name: Package DMG + ZIP
        run: ./scripts/package-dmg.sh "${{ steps.version.outputs.version }}"

      - name: Upload artifacts to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/YrMenuBar-${{ steps.version.outputs.version }}.dmg" \
            "dist/YrMenuBar-${{ steps.version.outputs.version }}.zip" \
            --title "YrMenuBar ${GITHUB_REF_NAME}" \
            --generate-notes \
            --notes "First-launch tip: after copying YrMenuBar.app to /Applications, run \`xattr -dr com.apple.quarantine /Applications/YrMenuBar.app\` in Terminal, then open it. The build is unsigned, and on recent macOS versions stripping the quarantine flag is the only reliable way to launch it."
