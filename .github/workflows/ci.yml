name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build -c debug
      - name: Build (strict concurrency check)
        run: swift build -c debug -Xswiftc -strict-concurrency=complete
      - name: Test
        run: swift test
